<!DOCTYPE html>
<html>
<head>
    <title>Join Rising Labs</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #000;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 60px;
            color: #00ffcc;
        }

        form {
            margin-top: 40px;
        }

        input, select {
            width: 280px;
            padding: 12px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            background: #111;
            color: white;
            border: 1px solid #222;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00ffcc;
        }

        button {
            padding: 12px 30px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: white;
        }
    </style>
</head>

<body>

<h1>Join Rising Labs 🚀</h1>

<form action="/submit" method="POST">

    <input name="name" placeholder="Your Name" required><br>

    <input name="contact" placeholder="Instagram or Email" required><br>

    <select name="role" required>
        <option value="">Select Role</option>
        <option value="founder">Founder</option>
        <option value="developer">Developer</option>
        <option value="designer">Designer</option>
    </select><br>

    <input name="idea" placeholder="Your idea or skills"><br>

    <button type="submit">Join Now</button>

</form>

</body>
</html>
